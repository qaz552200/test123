<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="UTF-8">
<title>数据管理后台</title>
<style>
body{margin:0;background:#f5f7fa;font-family:微软雅黑}
.header{background:#5f9ea0;color:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.header button{padding:6px 12px;background:#fff;color:#333;border:none;border-radius:6px;margin-left:10px;cursor:pointer}
.container{padding:20px}
.overview{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.card{background:#fff;padding:16px 20px;border-radius:8px;min-width:160px;box-shadow:0 2px 8px #0000000a}
.card .label{font-size:14px;color:#666}
.card .value{font-size:20px;font-weight:bold;margin-top:6px}
.search-bar{background:#fff;padding:12px;border-radius:8px;margin-bottom:16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-bar input{padding:8px 12px;border:1px solid #ddd;border-radius:6px}
.search-bar button{padding:8px 14px;border:none;border-radius:6px;color:#fff;cursor:pointer}
.btn-blue{background:#00b4ff}
.btn-orange{background:#ff7d00}
.btn-green{background:#00a862}
.btn-red{background:#f53f3f}
table{width:100%;background:#fff;border-collapse:collapse;border-radius:8px;overflow:hidden}
th,td{padding:12px;text-align:center;border-bottom:1px solid #eee}
th{background:#f8f9fa}
.opt button{padding:5px 8px;border:none;border-radius:4px;color:#fff;margin:0 2px}
.detail{background:#00b4ff}
.refresh{background:#00a862}
.edit{background:#ff7d00}
.del{background:#f53f3f}
.pagination{margin-top:12px;display:flex;justify-content:space-between;align-items:center}
.pages button{padding:6px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;margin:0 2px}
.pages .active{background:#00b4ff;color:#fff;border-color:#00b4ff}

.mask{position:fixed;top:0;left:0;width:100%;height:100%;background:#00000070;display:none;justify-content:center;align-items:center}
.pop{background:#fff;width:460px;padding:30px;border-radius:10px}
.pop h3{margin-top:0}
.pop input{width:100%;margin-bottom:12px;padding:10px;border:1px solid #ddd;border-radius:6px}
.pop button{margin-top:10px;padding:10px 16px;background:#00b4ff;color:#fff;border:none;border-radius:6px;cursor:pointer}
</style>

<div class="header">
  <div>数据管理后台</div>
  <div>
    <span id=userName></span>
    <button onclick="logout()">退出登录</button>
    <button onclick="openPwd()">修改密码</button>
  </div>
</div>

<div class="container">
  <div class="overview">
    <div class=card><div class=label>昨日总增长</div><div class=value id=dayInc>0</div></div>
    <div class=card><div class=label>实时总增长</div><div class=value id=rtInc>0</div></div>
    <div class=card><div class=label>日均总增长</div><div class=value id=avgInc>0</div></div>
    <div class=card><div class=label>喜欢总增长</div><div class=value id=likeTotal>0</div></div>
    <div class=card><div class=label>日均均值</div><div class=value id=avgDay>0</div></div>
    <div class=card><div class=label>昨日均值</div><div class=value id=yesDay>0</div></div>
    <div class=card><div class=label>实时均值</div><div class=value id=rtDay>0</div></div>
    <div class=card><button class="btn-green" onclick=showHistory()>历史记录</button></div>
  </div>

  <div class="search-bar">
    <input id=kw placeholder="搜索设备/昵称/抖音号" style="width:240px">
    <button class="btn-blue" onclick=search()>搜索</button>
    <button class="btn-blue" onclick=add()>新增</button>
    <button class="btn-orange" onclick=refreshOne()>刷新选中</button>
    <button class="btn-orange" onclick=delBatch()>批量删除</button>
    <button class="btn-green" onclick=exportExcel()>导出Excel</button>
    <button class="btn-green" onclick=refreshAll()>全部刷新</button>
  </div>

  <table>
    <tr>
      <th><input type=checkbox id=allCheck onclick=checkAll()></th>
      <th>设备</th><th>昵称</th><th>抖音号</th><th>运行天数</th>
      <th>获赞</th><th>粉丝</th><th>收藏</th><th>喜欢</th><th>备注</th><th>操作</th>
    </tr>
    <tbody id=list></tbody>
  </table>

  <div class=pagination>
    <div>共 <span id=total>0</span> 条，当前第 <span id=page>1</span> 页</div>
    <div class=pages>
      <button onclick=prev()>&lt;</button>
      <button class=active>1</button>
      <button onclick=next()>&gt;</button>
    </div>
  </div>
</div>

<!-- 新增/修改弹窗 -->
<div class=mask id=mask>
  <div class=pop>
    <h3 id=popTitle>新增账号</h3>
    <input id=device placeholder="设备编号">
    <input id=nick placeholder="昵称">
    <input id=uid placeholder="抖音号">
    <input id=note placeholder="备注">
    <button onclick=save()>保存</button>
  </div>
</div>

<!-- 修改密码弹窗 -->
<div class=mask id=pwdMask>
  <div class=pop>
    <h3>修改密码</h3>
    <input id=oldPwd placeholder="原密码">
    <input id=newPwd placeholder="新密码">
    <button onclick=savePwd()>保存</button>
  </div>
</div>

<script>
// 登录验证
if(localStorage.login !== 'ok') location.href='login.html'
document.getElementById('userName').innerText = '欢迎：' + localStorage.loginUser

// 数据结构
let list = JSON.parse(localStorage.getItem('accountList')) || [
  {id:1, device:'077', nick:'用户5219', uid:'93602094', day:0, zan:0, fans:0, fav:0, like:0, note:'王台aa12'},
  {id:2, device:'076', nick:'伊艳伊伊', uid:'37938692', day:0, zan:0, fans:0, fav:0, like:0, note:'王台aa12'},
]

let pageSize = 10
let currentPage = 1
let editId = null

function saveList(){
  localStorage.accountList = JSON.stringify(list)
  calcStat()
}

// 统计面板
function calcStat(){
  let totalLike = list.reduce((s,i)=>s+i.like,0)
  document.getElementById('likeTotal').innerText = totalLike
  document.getElementById('dayInc').innerText = Math.floor(Math.random()*5000+3000)
  document.getElementById('rtInc').innerText = 0
  document.getElementById('avgInc').innerText = Math.floor(Math.random()*7000+4000)
  document.getElementById('avgDay').innerText = Math.floor(Math.random()*50+20)
  document.getElementById('yesDay').innerText = Math.floor(Math.random()*60+30)
  document.getElementById('rtDay').innerText = 0
}

// 渲染表格
function render(){
  let total = list.length
  document.getElementById('total').innerText = total
  let start = (currentPage-1)*pageSize
  let end = start + pageSize
  let show = list.slice(start, end)

  let html = ''
  show.forEach(item=>{
    html+=`
    <tr>
      <td><input type=checkbox class=cb value=${item.id}></td>
      <td>${item.device}</td>
      <td>${item.nick}</td>
      <td>${item.uid}</td>
      <td>${item.day}</td>
      <td>${item.zan}</td>
      <td>${item.fans}</td>
      <td>${item.fav}</td>
      <td>${item.like}</td>
      <td>${item.note}</td>
      <td class=opt>
        <button class=detail onclick=view(${item.id})>详情</button>
        <button class=refresh onclick=refreshItem(${item.id})>刷新</button>
        <button class=edit onclick=edit(${item.id})>修改</button>
        <button class=del onclick=del(${item.id})>删除</button>
      </td>
    </tr>`
  })
  document.getElementById('list').innerHTML = html
}

// 搜索
function search(){
  let kw = document.getElementById('kw').value.toLowerCase()
  let arr = list.filter(x=>
    x.device.toLowerCase().includes(kw)||
    x.nick.toLowerCase().includes(kw)||
    x.uid.toLowerCase().includes(kw)
  )
  let html=''
  arr.forEach(item=>{
    html+=`
    <tr>
      <td><input type=checkbox class=cb value=${item.id}></td>
      <td>${item.device}</td><td>${item.nick}</td><td>${item.uid}</td>
      <td>${item.day}</td><td>${item.zan}</td><td>${item.fans}</td><td>${item.fav}</td><td>${item.like}</td>
      <td>${item.note}</td>
      <td class=opt>
        <button class=detail>详情</button>
        <button class=refresh onclick=refreshItem(${item.id})>刷新</button>
        <button class=edit onclick=edit(${item.id})>修改</button>
        <button class=del onclick=del(${item.id})>删除</button>
      </td>
    </tr>`
  })
  document.getElementById('list').innerHTML = html
}

// 新增
function add(){
  editId = null
  document.getElementById('popTitle').innerText = '新增账号'
  document.getElementById('device').value = ''
  document.getElementById('nick').value = ''
  document.getElementById('uid').value = ''
  document.getElementById('note').value = ''
  document.getElementById('mask').style.display = 'flex'
}

// 修改
function edit(id){
  editId = id
  let item = list.find(x=>x.id==id)
  document.getElementById('popTitle').innerText = '修改账号'
  document.getElementById('device').value = item.device
  document.getElementById('nick').value = item.nick
  document.getElementById('uid').value = item.uid
  document.getElementById('note').value = item.note
  document.getElementById('mask').style.display = 'flex'
}

// 保存
function save(){
  let device = document.getElementById('device').value.trim()
  let nick   = document.getElementById('nick').value.trim()
  let uid    = document.getElementById('uid').value.trim()
  let note   = document.getElementById('note').value.trim()
  if(!device || !nick) return alert('设备和昵称不能为空')

  if(editId){
    let i = list.findIndex(x=>x.id==editId)
    list[i] = {...list[i], device, nick, uid, note}
  }else{
    let newId = list.length ? Math.max(...list.map(x=>x.id))+1 : 1
    list.push({id:newId, device,nick,uid,note, day:0, zan:0, fans:0, fav:0, like:0})
  }
  saveList()
  render()
  document.getElementById('mask').style.display = 'none'
}

// 删除单条
function del(id){
  if(!confirm('确定删除？')) return
  list = list.filter(x=>x.id!=id)
  saveList()
  render()
}

// 批量删除
function delBatch(){
  let arr = Array.from(document.querySelectorAll('.cb:checked')).map(x=>+x.value)
  if(arr.length===0) return alert('请选择')
  if(!confirm('确定批量删除？')) return
  list = list.filter(x=>!arr.includes(x.id))
  saveList()
  render()
}

// 刷新单条
function refreshItem(id){
  let i = list.findIndex(x=>x.id==id)
  list[i].zan  += Math.floor(Math.random()*50+5)
  list[i].fans += Math.floor(Math.random()*20+2)
  list[i].like += Math.floor(Math.random()*100+10)
  list[i].day  += 1
  saveList()
  render()
}

// 刷新选中
function refreshOne(){
  let arr = Array.from(document.querySelectorAll('.cb:checked')).map(x=>+x.value)
  if(arr.length===0) return alert('请选择')
  arr.forEach(id=>{
    let i = list.findIndex(x=>x.id==id)
    if(i>=0){
      list[i].zan += Math.ra
