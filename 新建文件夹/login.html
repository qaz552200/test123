<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="UTF-8">
<title>登录</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:微软雅黑}
body{background:#f0f2f5;display:flex;height:100vh;align-items:center;justify-content:center}
.login{width:380px;background:#fff;padding:40px;border-radius:12px;box-shadow:0 0 20px #00000010}
h2{text-align:center;margin-bottom:25px}
input{width:100%;height:44px;padding:0 14px;border:1px solid #ddd;border-radius:8px;margin-bottom:16px}
button{width:100%;height:46px;background:#00b4ff;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
#err{color:red;text-align:center;margin-top:10px;font-size:13px;display:none}
</style>

<div class=login>
  <h2>数据管理后台</h2>
  <input id=user placeholder=账号>
  <input id=pwd type=password placeholder=密码>
  <button onclick=login()>登录</button>
  <div id=err>账号或密码错误</div>
</div>

<script>
function login(){
  let u = document.getElementById('user').value.trim()
  let p = document.getElementById('pwd').value.trim()

  let users = JSON.parse(localStorage.getItem('users')) || {
    admin: "123456"
  }

  if(users[u] && users[u] === p){
    localStorage.loginUser = u
    localStorage.login = "ok"
    location.href = "dashboard.html"
  }else{
    document.getElementById('err').style.display = "block"
  }
}
</script>
</html>
